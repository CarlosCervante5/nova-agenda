<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tapai - Booking System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #f7f2ea; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { text-align: center; padding: 40px; }
    h1 { color: #7d7f3e; font-size: 32px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 30px; }
    .btn { display: inline-block; padding: 14px 28px; margin: 10px; border-radius: 12px; text-decoration: none; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: #7d7f3e; color: white; }
    .btn-primary:hover { background: #aaa66a; transform: translateY(-2px); }
    .btn-secondary { background: #fff; color: #7d7f3e; border: 2px solid #7d7f3e; }
    .btn-secondary:hover { background: #f0ebe3; }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/tapai_logo.png" alt="Tapai Centro de Sanación" style="max-width:280px;width:100%;height:auto;margin-bottom:16px;">
    <p>Booking System</p>
    <a href="admin-dist/" class="btn btn-primary">Admin Panel</a>
    <a href="public/" class="btn btn-secondary">Book Appointment</a>
  </div>
</body>
</html>
